apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: bidding/user 
          ports:
            - containerPort: 3001 
          env:
            - name: DB_HOST
              value: 'user-db-srv'
            - name: DB_PORT
              value: '5432'
            - name: DB_NAME
              value: 'bidding_user_db'
            - name: NODE_ENV
              value: 'development'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRE
              value: '36000s'
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: user-srv
spec:
  selector:
    app: user
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
