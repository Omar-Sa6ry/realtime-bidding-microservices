apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
        - name: ai
          image: bidding/ai
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: 'development'
            - name: PORT_AI
              value: '3005'
            - name: NATS_URL
              value: 'nats://nats-srv:4222'
            - name: JWT_EXPIRE
              value: '36000s'
            - name: REDIS_HOST
              value: 'redis-srv'
            - name: REDIS_PORT
              value: '6379'
            - name: USER_SERVICE_URL
              value: 'user-srv:50051'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: JWT_SECRET
          envFrom:
            - secretRef:
                name: ai-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-srv
spec:
  selector:
    app: ai
  ports:
    - name: http
      protocol: TCP
      port: 3005
      targetPort: 3005
