query {
  aiHello
}

subscription {
  aiMessageChunk {
    chunk
    isFinal
    threadId
    userId
  }
}

mutation {
  sendMessage(
    input: {
      auctionId: "69e4d739ab2478611ae474a7"
      text: "Could you tell me the details of this auction? And is the price suitable for my balance?"
    }
  ) {
    data {
      threadId
      userId
      isFinal
    }
    message
    statusCode
  }
}

query {
  getUserChatThreads(pagination: { page: 1, limit: 5 }) {
    statusCode
    items {
      userId
      title
      auctionId
    }
  }
}

query {
  getChatMessages(threadId: "69e4d889836193ff62294ca3") {
    success
    message
    timeStamp
    items {
      role
      content
      threadId
    }
  }
}
