mutation PlaceNewBid {
  placeBid(auctionId: "69e4d739ab2478611ae474a7", amount: 100) {
    success
    message
    statusCode
    data {
      id
      userId
      amount
      status
      createdAt
      auction {
        id
        status
        startTime
        endTime
        description
        seller {
          lastname
          email
          firstname
        }
      }
    }
  }
}

