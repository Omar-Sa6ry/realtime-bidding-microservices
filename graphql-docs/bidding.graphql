mutation PlaceNewBid {
  placeBid(auctionId: "69c3959061b3e307b021c026", amount: 52551.50) {
    success
    message
    statusCode
    data {
      id
      userId
      amount
      status
      createdAt
      auction {
        id
        status
        startTime
        endTime
        description
        seller {
          lastname
          email
          firstname
        }
      }
    }
  }
}

