mutation PlaceNewBid {
  placeBid(auctionId: "69bf74e559299dfdadab004d", amount: 52551.50) {
    success
    message
    statusCode
    data {
      id
      auctionId
      userId
      amount
      status
      createdAt
    }
  }
}

