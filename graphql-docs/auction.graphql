mutation {
  createAuction(
    input: {
      title: "Cron Test Auction"
      description: "Testing automatic status transition"
      startingPrice: 50.0
      currency: "EGP"
      startTime: "2025-04-18T22:06:00+02:00"
      endTime: "2027-09-29T22:07:00+02:00"
    }
  ) {
    success
    message
    data {
      id
      status
      startTime
      endTime
      description
      seller {
        lastname
        email
        firstname
      }
    }
  }
}

query {
  findAuctionByID(id: "69e4ca24ae0b9188f436eb9b") {
    success
    message
    statusCode
    data {
      id
      title
      status
      seller {
        lastname
        email
        firstname
      }
    }
  }
}

query {
  findAuctions(
    pagination: { page: 1, limit: 10 }
    input: { title: "Vintage" }
  ) {
    success
    statusCode
    message
    totalPages
    currentPage
    totalItems
    data {
      id
      status
      title
      startingPrice
      currency
      seller {
        lastname
        email
        firstname
      }
    }
  }
}

mutation {
  updateAuction(
    id: "69e4c4d5ae0b9188f436eb97"
    input: { title: "Updated Title", startingPrice: 600.0 }
  ) {
    success
    message
    data {
      title
      startingPrice
      updatedAt
      seller {
        lastname
        email
        firstname
      }
    }
  }
}

mutation {
  deleteAuction(id: "69e4c541ae0b9188f436eb99") {
    success
    message
    data {
      id
      title
    }
  }
}
