syntax = "proto3";

package user;

option go_package = "github.com/Omar-Sa6ry/realtime-bidding-microservices/proto/user";

// User Service
service UserService {
  rpc Register (RegisterRequest) returns (RegisterResponse) {}
  rpc Login (LoginRequest) returns (LoginResponse) {}
  rpc GetUser (GetUserRequest) returns (GetUserResponse) {}
  rpc GetUsers (GetUsersRequest) returns (GetUsersResponse) {}
  rpc UpdateBalance (UpdateBalanceRequest) returns (UpdateBalanceResponse) {}
}

// User Entity
message User {
  string id = 1;
  string email = 2;
  double balance = 3;
  string firstname = 4;
  string lastname = 5;
}

// Messages for Register
message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  User user = 1;
  string token = 2; // JWT Token
}

// Messages for Login
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  User user = 1;
  string token = 2; // JWT Token
}

// Messages for GetUser
message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message GetUsersRequest {
  repeated string ids = 1;
}

message GetUsersResponse {
  repeated User users = 1;
}

// Messages for UpdateBalance
message UpdateBalanceRequest {
  string user_id = 1;
  double amount = 2;
  string transaction_type = 3; // "add" or "deduct"
}

message UpdateBalanceResponse {
  bool success = 1;
  double new_balance = 2;
  string message = 3;
}
