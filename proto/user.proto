syntax = "proto3";

package user;

option go_package = "github.com/Omar-Sa6ry/realtime-bidding-microservices/proto/user";

// User Service
service UserService {
  rpc Register (RegisterRequest) returns (RegisterResponse) {}
  rpc Login (LoginRequest) returns (LoginResponse) {}
  rpc GetUser (GetUserRequest) returns (GetUserResponse) {}
  rpc UpdateBalance (UpdateBalanceRequest) returns (UpdateBalanceResponse) {}
}

// User Entity
message User {
  string id = 1;
  string username = 2;
  string email = 3;
  double balance = 4;
}

// Messages for Register
message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  User user = 1;
  string token = 2; // JWT Token
}

// Messages for Login
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  User user = 1;
  string token = 2; // JWT Token
}

// Messages for GetUser
message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}
