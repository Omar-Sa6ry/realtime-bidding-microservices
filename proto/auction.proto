syntax = "proto3";

package auction;

option go_package = "realtime-bidding-microservices/services/auction-service/internal/grpc/pb";

service AuctionService {
  rpc ValidateAuctionForBid (ValidateAuctionRequest) returns (ValidateAuctionResponse) {}
  rpc GetAuction (GetAuctionRequest) returns (ValidateAuctionResponse) {}
}

message GetAuctionRequest {
  string auction_id = 1;
}

message ValidateAuctionRequest {
  string auction_id = 1;
  string user_id = 2;
  double amount = 3;
}

message ValidateAuctionResponse {
  bool is_active = 1;
  string error_message = 2; // Populated if is_active is false
}
