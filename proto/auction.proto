syntax = "proto3";

package auction;

option go_package = "realtime-bidding-microservices/services/auction-service/internal/grpc/pb";

service AuctionService {
  rpc ValidateAuctionForBid (ValidateAuctionRequest) returns (ValidateAuctionResponse) {}
}

message ValidateAuctionRequest {
  string auction_id = 1;
}

message ValidateAuctionResponse {
  bool is_active = 1;
  double current_price = 2;
  string seller_id = 3;
  string error_message = 4; // Populated if is_active is false
}
