apiVersion: skaffold/v4beta3
kind: Config

manifests:
  rawYaml:
    - ./k8s/*

build:
  local:
    push: false

  artifacts:
    - image: bidding/user
      context: .
      docker:
        dockerfile: services/user-service/Dockerfile
      sync:
        manual:
          - src: 'services/user-service/src/**/*.ts'
            dest: src
          - src: 'proto/**/*.proto'
            dest: ../../proto

    - image: bidding/api-gateway
      context: .
      docker:
        dockerfile: services/api-gateway/Dockerfile
      sync:
        manual:
          - src: 'services/api-gateway/src/**/*.ts'
            dest: src
          - src: 'proto/**/*.proto'
            dest: ../../proto

    - image: bidding/auction
      context: .
      docker:
        dockerfile: services/auction-service/Dockerfile
      sync:
        manual:
          - src: 'services/auction-service/**/*.go'
            dest: .
          - src: 'services/auction-service/go.mod'
            dest: go.mod
          - src: 'services/auction-service/go.sum'
            dest: go.sum
          - src: 'services/auction-service/.air.toml'
            dest: .air.toml
          - src: 'proto/**/*.proto'
            dest: proto
