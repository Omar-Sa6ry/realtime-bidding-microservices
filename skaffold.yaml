apiVersion: skaffold/v4beta3
kind: Config

manifests:
  rawYaml:
    - ./k8s/*

build:
  local:
    push: false

  artifacts:
    - image: bidding/user
      context: .
      docker:
        dockerfile: services/user-service/Dockerfile
      sync:
        manual:
          - src: 'services/user-service/src/**/*.ts'
            dest: /usr/src/app
          - src: 'proto/**/*.proto'
            dest: /usr/src/app

    - image: bidding/api-gateway
      context: .
      docker:
        dockerfile: services/api-gateway/Dockerfile
      sync:
        manual:
          - src: 'services/api-gateway/src/**/*.ts'
            dest: /usr/src/app
          - src: 'proto/**/*.proto'
            dest: /usr/src/app

    - image: bidding/auction
      context: .
      docker:
        dockerfile: services/auction-service/Dockerfile
      sync:
        manual:
          - src: 'services/auction-service/**/*.go'
            dest: /usr/src/app
          - src: 'services/auction-service/go.mod'
            dest: /usr/src/app
          - src: 'services/auction-service/go.sum'
            dest: /usr/src/app
          - src: 'services/auction-service/.air.toml'
            dest: /usr/src/app
          - src: 'proto/**/*.proto'
            dest: /usr/src/app

    - image: bidding/bidding
      context: .
      docker:
        dockerfile: services/bidding-service/Dockerfile
      sync:
        manual:
          - src: 'services/bidding-service/**/*.go'
            dest: /usr/src/app
          - src: 'services/bidding-service/go.mod'
            dest: /usr/src/app
          - src: 'services/bidding-service/go.sum'
            dest: /usr/src/app
          - src: 'proto/**/*.proto'
            dest: /usr/src/app

portForward:
  - resourceType: service
    resourceName: api-gateway-srv
    port: 4000
    localPort: 4000
  - resourceType: service
    resourceName: auction-srv
    port: 3002
    localPort: 3002
