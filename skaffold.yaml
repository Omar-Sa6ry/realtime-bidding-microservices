apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: realtime-bidding-microservices

build:
  local:
    push: false
    concurrency: 1
  artifacts:
    - image: bidding/user
      context: .
      docker:
        dockerfile: services/user-service/Dockerfile
      sync:
        manual:
          - src: 'services/user-service/src/**/*.ts'
            dest: services/user-service/src
          - src: 'proto/**/*.proto'
            dest: proto

    - image: bidding/api-gateway
      context: .
      docker:
        dockerfile: services/api-gateway/Dockerfile
      sync:
        manual:
          - src: 'services/api-gateway/src/**/*.ts'
            dest: services/api-gateway/src
          - src: 'proto/**/*.proto'
            dest: proto

manifests:
  rawYaml:
    - k8s/*.yaml

portForward:
  - resourceType: Service
    resourceName: api-gateway-srv
    namespace: default
    port: 3001
    localPort: 3001